<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldAgent — Manager Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --surface2:  #f0ece4;
  --border:    #ddd8ce;
  --border2:   #ccc6ba;
  --text:      #1a1814;
  --text-mid:  #6b6458;
  --text-dim:  #a8a099;
  --accent:    #c4472a;
  --accent-bg: #fdf0ed;
  --green:     #2a7a4b;
  --green-bg:  #edf7f1;
  --amber:     #b06e00;
  --amber-bg:  #fef8ed;
  --blue:      #1a5fa8;
  --blue-bg:   #edf3fc;
  --mono:      'DM Mono', monospace;
  --serif:     'Fraunces', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
}

/* ── Layout ── */
.shell {
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 280px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main";
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  background: var(--text);
  color: var(--bg);
  border-bottom: 3px solid var(--accent);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: #fff;
}

.logo span { color: var(--accent); }

.header-subtitle {
  font-size: 11px;
  color: #8a8278;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: #aaa49c;
  letter-spacing: 0.06em;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #888;
  transition: background 0.3s;
}
.live-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade8088; animation: livepulse 2s infinite; }
.live-dot.error     { background: var(--accent); }

@keyframes livepulse {
  0%,100% { opacity:1; } 50% { opacity:0.5; }
}

/* ── Sidebar ── */
aside {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.kpi {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
}

.kpi-value {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}

.kpi-label {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.kpi.accent .kpi-value { color: var(--accent); }
.kpi.green  .kpi-value { color: var(--green); }

/* Filters */
.filter-group { display: flex; flex-direction: column; gap: 6px; }

label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

select, input[type=text], input[type=date] {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}

select:focus, input:focus { border-color: var(--text-mid); }

.btn-filter {
  width: 100%;
  padding: 8px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.15s;
}

.btn-filter:hover { background: #333; }

/* Worker list */
.worker-list { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; padding: 12px 16px; }

.worker-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.1s;
}

.worker-row:hover { background: var(--surface2); }
.worker-row.active { background: var(--text); color: var(--bg); }

.worker-name { font-size: 12px; }
.worker-count {
  font-size: 10px;
  background: var(--border);
  color: var(--text-mid);
  padding: 2px 7px;
  border-radius: 10px;
}
.worker-row.active .worker-count { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

/* ── Main ── */
main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 12px;
}

.toolbar-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
}

.toolbar-count {
  font-size: 12px;
  color: var(--text-dim);
}

.sort-select {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
}

/* Log list */
.log-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.log-list::-webkit-scrollbar { width: 5px; }
.log-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Log card ── */
.log-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.log-card:hover {
  border-color: var(--border2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.log-card.new-entry {
  animation: cardslide 0.4s ease;
  border-color: var(--accent);
}

@keyframes cardslide {
  from { opacity:0; transform: translateX(-8px); border-color: var(--accent); }
  to   { opacity:1; transform: translateX(0); }
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  gap: 12px;
}

.card-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.card-status-bar {
  width: 4px;
  height: 40px;
  border-radius: 2px;
  flex-shrink: 0;
}

.status-complete  { background: var(--green); }
.status-prevented { background: var(--accent); }
.status-pending   { background: var(--amber); }

.card-meta {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}

.card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}

.card-total {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--green);
}

.card-total.zero { color: var(--text-dim); font-size: 14px; font-family: var(--mono); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.badge-complete  { background: var(--green-bg);  color: var(--green); }
.badge-prevented { background: var(--accent-bg); color: var(--accent); }
.badge-pending   { background: var(--amber-bg);  color: var(--amber); }
.badge-billable  { background: var(--green-bg);  color: var(--green); }
.badge-no-bill   { background: var(--surface2);  color: var(--text-dim); }
.badge-flag      { background: var(--accent-bg); color: var(--accent); }

/* Card detail (expandable) */
.card-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 16px;
}

.log-card.expanded .card-detail { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.detail-section { }

.detail-heading {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
  gap: 8px;
}

.detail-key { color: var(--text-mid); flex-shrink: 0; }
.detail-val { color: var(--text); text-align: right; font-weight: 500; }

.material-line {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
  border-bottom: 1px dashed var(--border);
  gap: 8px;
}
.material-line:last-child { border: none; }

.flag-pill {
  display: flex;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 5px;
  font-size: 11px;
  line-height: 1.5;
  margin-bottom: 6px;
}
.flag-pill:last-child { margin: 0; }
.flag-critical { background: var(--accent-bg); border-left: 3px solid var(--accent); }
.flag-warning  { background: var(--amber-bg);  border-left: 3px solid var(--amber); }
.flag-info     { background: var(--blue-bg);   border-left: 3px solid var(--blue); }

.flag-sev {
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 3px;
  align-self: flex-start;
  flex-shrink: 0;
}
.flag-critical .flag-sev { background: var(--accent); color: #fff; }
.flag-warning  .flag-sev { background: var(--amber);  color: #fff; }
.flag-info     .flag-sev { background: var(--blue);   color: #fff; }

.reason-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.6;
  margin-top: 8px;
  grid-column: 1 / -1;
}

.invoice-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--green-bg);
  border: 1px solid #b8dfc8;
  border-radius: 5px;
  margin-top: 8px;
}
.invoice-total-row .tot-label { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 0.08em; }
.invoice-total-row .tot-val   { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--green); }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
  pointer-events: none;
}

.toast {
  background: var(--text);
  color: var(--bg);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  border-left: 4px solid var(--accent);
  animation: toastin 0.3s ease;
  max-width: 320px;
  line-height: 1.4;
  pointer-events: all;
}

@keyframes toastin {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

.toast.fade-out { animation: toastout 0.3s ease forwards; }

@keyframes toastout {
  to { opacity:0; transform: translateY(8px); }
}

/* Empty */
.empty-list {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-list .empty-icon {
  font-family: var(--serif);
  font-size: 48px;
  font-style: italic;
  color: var(--border2);
  display: block;
  margin-bottom: 16px;
}

.empty-list p { font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">Field<span>Agent</span></div>
      <div class="header-subtitle">Manager Dashboard</div>
    </div>
    <div class="live-pill">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">connecting…</span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-section">
      <div class="section-title">Overview</div>
      <div class="kpi-grid">
        <div class="kpi green">
          <div class="kpi-value" id="kpiTotal">—</div>
          <div class="kpi-label">Total logs</div>
        </div>
        <div class="kpi accent">
          <div class="kpi-value" id="kpiFlags">—</div>
          <div class="kpi-label">Flagged</div>
        </div>
        <div class="kpi">
          <div class="kpi-value" id="kpiBillable">—</div>
          <div class="kpi-label">Billable</div>
        </div>
        <div class="kpi">
          <div class="kpi-value" id="kpiRevenue">—</div>
          <div class="kpi-label">Revenue €</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Filters</div>
      <div class="filter-group">
        <label>Customer</label>
        <select id="filterCustomer">
          <option value="">All customers</option>
          <option value="NPS-001">Nordic Property Services</option>
          <option value="FBL-001">FrostBite Logistics</option>
          <option value="GFS-001">Greenfield Schools</option>
        </select>

        <label>Status</label>
        <select id="filterStatus">
          <option value="">All statuses</option>
          <option value="complete">Complete</option>
          <option value="prevented">Prevented</option>
          <option value="pending_approval">Pending Approval</option>
          <option value="pending_review">Pending Review</option>
        </select>

        <label>Date from</label>
        <input type="date" id="filterDateFrom">

        <button class="btn-filter" onclick="applyFilters()">Apply filters</button>
        <button class="btn-filter" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);margin-top:0" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="section-title" style="padding:14px 16px 0">Workers</div>
    <div class="worker-list" id="workerList"></div>
  </aside>

  <!-- Main -->
  <main>
    <div class="main-toolbar">
      <div>
        <div class="toolbar-title">Work Logs</div>
        <div class="toolbar-count" id="toolbarCount">loading…</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="margin:0;color:var(--text-dim);font-size:11px">Sort:</label>
        <select class="sort-select" id="sortSelect" onchange="sortAndRender()">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="highest">Highest cost</option>
          <option value="flags">Flags first</option>
        </select>
      </div>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-list"><span class="empty-icon">∅</span><p>Connecting to server…</p></div>
    </div>
  </main>

</div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<script>
const API = 'http://localhost:8000';

const WORKERS = {
  'W-001': 'Pekka Virtanen',
  'W-002': 'Janne Korhonen',
  'W-003': 'Lauri Heikkinen',
  'W-004': 'Sanna Mäkelä',
};

const CUSTOMERS = {
  'NPS-001': 'Nordic Property',
  'FBL-001': 'FrostBite Logistics',
  'GFS-001': 'Greenfield Schools',
};

let allLogs = [];        // full dataset from SSE snapshot + live pushes
let activeWorker = null; // sidebar filter
let filters = {};

// ── SSE Connection ────────────────────────────────────────────
function connectSSE() {
  const dot = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');

  const es = new EventSource(`${API}/stream`);

  es.addEventListener('snapshot', e => {
    const logs = JSON.parse(e.data);
    allLogs = logs;
    dot.className = 'live-dot connected';
    label.textContent = 'live';
    sortAndRender();
    updateSidebar();
  });

  es.addEventListener('worklog', e => {
    const { work_log } = JSON.parse(e.data);
    // Prepend (it's the newest)
    allLogs.unshift(work_log);
    sortAndRender();
    updateSidebar();
    showToast(work_log);
  });

  es.addEventListener('ping', () => {});

  es.onerror = () => {
    dot.className = 'live-dot error';
    label.textContent = 'disconnected';
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Filtering & sorting ───────────────────────────────────────
function getFiltered() {
  let logs = [...allLogs];

  if (activeWorker) logs = logs.filter(l => l.worker_id === activeWorker);
  if (filters.customer) logs = logs.filter(l => l.customer_id === filters.customer);
  if (filters.status)   logs = logs.filter(l => l.status === filters.status);
  if (filters.dateFrom) logs = logs.filter(l => l.date >= filters.dateFrom);

  return logs;
}

function sortAndRender() {
  const sort = document.getElementById('sortSelect').value;
  let logs = getFiltered();

  if (sort === 'newest')  logs.sort((a,b) => b.date.localeCompare(a.date));
  if (sort === 'oldest')  logs.sort((a,b) => a.date.localeCompare(b.date));
  if (sort === 'highest') logs.sort((a,b) => (b.invoice_item?.total_cost||0) - (a.invoice_item?.total_cost||0));
  if (sort === 'flags')   logs.sort((a,b) => (b.compliance_flags?.length||0) - (a.compliance_flags?.length||0));

  renderLogs(logs);
  document.getElementById('toolbarCount').textContent =
    `${logs.length} log${logs.length !== 1 ? 's' : ''}${activeWorker ? ' · ' + WORKERS[activeWorker] : ''}`;
}

function applyFilters() {
  filters = {
    customer: document.getElementById('filterCustomer').value,
    status:   document.getElementById('filterStatus').value,
    dateFrom: document.getElementById('filterDateFrom').value,
  };
  sortAndRender();
}

function clearFilters() {
  filters = {};
  activeWorker = null;
  document.getElementById('filterCustomer').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.querySelectorAll('.worker-row').forEach(r => r.classList.remove('active'));
  sortAndRender();
}

// ── Sidebar ───────────────────────────────────────────────────
function updateSidebar() {
  // KPIs
  const total = allLogs.length;
  const billable = allLogs.filter(l => l.billable).length;
  const flagged = allLogs.filter(l => l.compliance_flags?.some(f => f.severity !== 'info')).length;
  const revenue = allLogs.reduce((sum, l) => sum + (l.invoice_item?.total_cost || 0), 0);

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiBillable').textContent = billable;
  document.getElementById('kpiFlags').textContent = flagged;
  document.getElementById('kpiRevenue').textContent = revenue >= 1000
    ? (revenue / 1000).toFixed(1) + 'k'
    : Math.round(revenue);

  // Worker counts
  const counts = {};
  allLogs.forEach(l => { counts[l.worker_id] = (counts[l.worker_id] || 0) + 1; });

  const list = document.getElementById('workerList');
  list.innerHTML = Object.entries(WORKERS).map(([id, name]) => `
    <div class="worker-row ${activeWorker === id ? 'active' : ''}" onclick="filterWorker('${id}')">
      <span class="worker-name">${name.split(' ')[0]}</span>
      <span class="worker-count">${counts[id] || 0}</span>
    </div>
  `).join('');
}

function filterWorker(id) {
  activeWorker = activeWorker === id ? null : id;
  updateSidebar();
  sortAndRender();
}

// ── Log cards ─────────────────────────────────────────────────
function renderLogs(logs) {
  const container = document.getElementById('logList');

  if (logs.length === 0) {
    container.innerHTML = `<div class="empty-list">
      <span class="empty-icon">∅</span>
      <p>No work logs found.<br>Complete a chat session to see entries appear here.</p>
    </div>`;
    return;
  }

  container.innerHTML = logs.map((log, i) => buildCard(log, i)).join('');
}

function buildCard(log, idx) {
  const inv = log.invoice_item;
  const statusClass = {
    complete: 'status-complete',
    prevented: 'status-prevented',
    pending_approval: 'status-pending',
    pending_review: 'status-pending',
  }[log.status] || 'status-pending';

  const badgeClass = {
    complete: 'badge-complete',
    prevented: 'badge-prevented',
    pending_approval: 'badge-pending',
    pending_review: 'badge-pending',
  }[log.status] || 'badge-pending';

  const flags = log.compliance_flags || [];
  const criticalFlags = flags.filter(f => f.severity === 'critical').length;
  const warnFlags = flags.filter(f => f.severity === 'warning').length;

  const totalStr = inv
    ? `<span class="card-total">${inv.total_cost.toFixed(2)} €</span>`
    : `<span class="card-total zero">not billed</span>`;

  // Detail section
  let detailHtml = `<div class="detail-grid">`;

  // Left: job info
  detailHtml += `<div class="detail-section">
    <div class="detail-heading">Job Details</div>
    <div class="detail-row"><span class="detail-key">Worker</span><span class="detail-val">${WORKERS[log.worker_id] || log.worker_id}</span></div>
    <div class="detail-row"><span class="detail-key">Customer</span><span class="detail-val">${CUSTOMERS[log.customer_id] || log.customer_id}</span></div>
    <div class="detail-row"><span class="detail-key">Site</span><span class="detail-val">${log.site_id}</span></div>
    <div class="detail-row"><span class="detail-key">Category</span><span class="detail-val">${log.service_category}</span></div>
    <div class="detail-row"><span class="detail-key">Type</span><span class="detail-val">${log.work_type.replace(/_/g,' ')}</span></div>
    <div class="detail-row"><span class="detail-key">Date</span><span class="detail-val">${log.date}</span></div>
    <div class="detail-row"><span class="detail-key">Hours</span><span class="detail-val">${log.hours_worked}h</span></div>
  </div>`;

  // Right: invoice / materials
  if (inv) {
    detailHtml += `<div class="detail-section">
      <div class="detail-heading">Invoice</div>
      <div class="detail-row"><span class="detail-key">Rate</span><span class="detail-val">${inv.rate_type} · ${inv.hourly_rate}€/h</span></div>
      <div class="detail-row"><span class="detail-key">Labor</span><span class="detail-val">${inv.labor_cost.toFixed(2)} €</span></div>
      <div class="detail-row"><span class="detail-key">Materials</span><span class="detail-val">${inv.materials_cost.toFixed(2)} € (+${inv.material_markup_percentage}%)</span></div>
      ${inv.travel_cost > 0 ? `<div class="detail-row"><span class="detail-key">Travel</span><span class="detail-val">${inv.travel_cost.toFixed(2)} €</span></div>` : ''}
      <div class="invoice-total-row"><span class="tot-label">Total</span><span class="tot-val">${inv.total_cost.toFixed(2)} €</span></div>
      ${inv.requires_approval ? `<div style="margin-top:8px;padding:7px 10px;background:var(--amber-bg);border-radius:4px;font-size:11px;color:var(--amber)">⚠ Approval required</div>` : ''}
    </div>`;
  } else {
    detailHtml += `<div class="detail-section">
      <div class="detail-heading">Invoice</div>
      <div style="font-size:12px;color:var(--text-dim);padding:8px 0">Not billed — see reasoning below.</div>
    </div>`;
  }

  // Materials (full width)
  if (log.materials && log.materials.length > 0) {
    detailHtml += `<div class="detail-section" style="grid-column:1/-1">
      <div class="detail-heading">Materials (${log.materials.length})</div>
      ${log.materials.map(m => `
        <div class="material-line">
          <span>${m.name}</span>
          <span style="color:var(--text-mid)">×${m.quantity} · ${m.total_price.toFixed(2)} €</span>
        </div>`).join('')}
    </div>`;
  }

  // Flags
  if (flags.length > 0) {
    detailHtml += `<div class="detail-section" style="grid-column:1/-1">
      <div class="detail-heading">Compliance Flags</div>
      ${flags.map(f => `
        <div class="flag-pill flag-${f.severity}">
          <span class="flag-sev">${f.severity}</span>
          <span>${esc(f.description)}</span>
        </div>`).join('')}
    </div>`;
  }

  // Reasoning (full width)
  detailHtml += `<div class="reason-box"><strong>Reasoning:</strong> ${esc(log.billability_reasoning)}</div>`;

  detailHtml += `</div>`; // close detail-grid

  return `
  <div class="log-card" onclick="toggleCard(this)">
    <div class="card-header">
      <div class="card-left">
        <div class="card-status-bar ${statusClass}"></div>
        <div class="card-meta">
          <div class="card-title">${log.service_category} — ${CUSTOMERS[log.customer_id] || log.customer_id}</div>
          <div class="card-subtitle">
            ${WORKERS[log.worker_id] || log.worker_id} · ${log.site_id} · ${log.date} · ${log.hours_worked}h
          </div>
        </div>
      </div>
      <div class="card-right">
        ${totalStr}
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
          <span class="badge ${badgeClass}">${log.status.replace(/_/g,' ')}</span>
          ${log.billable ? '<span class="badge badge-billable">billable</span>' : '<span class="badge badge-no-bill">not billed</span>'}
          ${criticalFlags > 0 ? `<span class="badge badge-flag">⚠ ${criticalFlags} critical</span>` : ''}
          ${warnFlags > 0 ? `<span class="badge badge-flag" style="background:var(--amber-bg);color:var(--amber)">! ${warnFlags} warn</span>` : ''}
        </div>
      </div>
    </div>
    <div class="card-detail">${detailHtml}</div>
  </div>`;
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(log) {
  const container = document.getElementById('toasts');
  const div = document.createElement('div');
  div.className = 'toast';

  const worker = WORKERS[log.worker_id] || log.worker_id;
  const customer = CUSTOMERS[log.customer_id] || log.customer_id;
  const total = log.invoice_item ? ` · ${log.invoice_item.total_cost.toFixed(2)} €` : '';
  const flags = log.compliance_flags?.filter(f => f.severity !== 'info').length || 0;

  div.innerHTML = `
    <strong>New work log</strong><br>
    ${worker} · ${customer}<br>
    <span style="color:#aaa">${log.service_category} · ${log.status.replace(/_/g,' ')}${total}${flags > 0 ? ' · ⚠ ' + flags + ' flag(s)' : ''}</span>
  `;

  container.appendChild(div);
  setTimeout(() => {
    div.classList.add('fade-out');
    setTimeout(() => div.remove(), 300);
  }, 5000);
}

// ── Util ──────────────────────────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// ── Boot ──────────────────────────────────────────────────────
connectSSE();
</script>
</body>
</html>
